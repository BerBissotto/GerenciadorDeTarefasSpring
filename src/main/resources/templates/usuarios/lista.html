<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org">
<head th:replace="fragments/fragment.html :: head('Cadastrar Usuário')">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main class="container mt-4 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Lista de Usuários</h2>
            <a class="btn btn-primary" th:href="/usuarios/novo">Novo Usuário</a>
        </div>

        <table class="table table-hover table-bordered">
            <thead class="thead-dark">
            <tr>
                <th>Usuários</th>
                <th>Funções</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.username}">admin</td>
            <td th:text="${usuario.role}">ADMIN</td>
            <td>
                <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/usuarios/excluir/{id}(id=${usuario.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja excluir este usuário?')">Excluir</a>
            </td>
            </tbody>
        </table>
    </main>
</body>
</html>
