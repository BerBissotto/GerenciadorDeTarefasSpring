<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Cadastrar Usuário')">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container my-5">
        <h2 class="mb-4 text-center">Cadastrar novo usuário</h2>

        <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post" class="w-50 ms-auto">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" id="username" name="username" class="form-control" th:field="*{username}" autofocus="autofocus" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="text" id="password" name="password" class="form-control" th:field="*{password}" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Cadastrar</button>
                <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </main>

    <div th:replace="fragments/fragment.html :: footer" class="mt-auto"></div>
</body>
</html>
